   viewBox="0 0 256 256"
   xmlns="http://www.w3.org/2000/svg">

  <!-- Outer square (light gray) -->
  <rect
     x="20"
     y="20"
     width="216"
     height="216"
     rx="24"
     ry="24"
     style="fill:#f5f5f5;" />

  <!-- Middle square (blue ring) -->
